version: '3.8'

services:

  # ---------------- US ----------------
  db-us:
    image: postgres:13
    container_name: db-us
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  region-us:
    build: .
    container_name: region-us
    environment:
      REGION: us
      PORT: 3000
      DB_HOST: db-us
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: incident_db
      US_SERVICE_URL: http://region-us:3000
      EU_SERVICE_URL: http://region-eu:3000
      APAC_SERVICE_URL: http://region-apac:3000
    ports:
      - "3000:3000"
    depends_on:
      db-us:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 5


  # ---------------- EU ----------------
  db-eu:
    image: postgres:13
    container_name: db-eu
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  region-eu:
    build: .
    container_name: region-eu
    environment:
      REGION: eu
      PORT: 3000
      DB_HOST: db-eu
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: incident_db
      US_SERVICE_URL: http://region-us:3000
      EU_SERVICE_URL: http://region-eu:3000
      APAC_SERVICE_URL: http://region-apac:3000
    ports:
      - "3001:3000"
    depends_on:
      db-eu:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 5


  # ---------------- APAC ----------------
  db-apac:
    image: postgres:13
    container_name: db-apac
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_db
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  region-apac:
    build: .
    container_name: region-apac
    environment:
      REGION: apac
      PORT: 3000
      DB_HOST: db-apac
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: incident_db
      US_SERVICE_URL: http://region-us:3000
      EU_SERVICE_URL: http://region-eu:3000
      APAC_SERVICE_URL: http://region-apac:3000
    ports:
      - "3002:3000"
    depends_on:
      db-apac:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 5